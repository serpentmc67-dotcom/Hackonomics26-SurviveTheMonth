<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food & Sanity Bars</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Nunito', sans-serif;
    height: 100vh;
    background: linear-gradient(160deg, #f0f4f8 0%, #cfd8dc 100%);
  }

  .status-bars {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 33vw; /* about 1/3 of page width */
    max-width: 500px;
    z-index: 1000;
  }

  .bar-wrapper {
    background: #f3e5d0; /* neutral background for both bars */
    border-radius: 24px;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.15);
  }

  .bar-label {
    font-family: 'Fredoka One', cursive;
    font-weight: 700;
    font-size: 20px;
    color: #ff9a42; /* orange-ish font for both */
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .bar-track {
    background: rgba(0,0,0,0.12);
    height: 36px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
  }

  .bar-fill {
    height: 100%;
    width: 100%;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 14px;
    color: #fff;
    font-weight: 600;
    font-family: 'Fredoka One', cursive;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    transition: width 0.5s ease-in-out;
  }

  /* Food gradient */
  .food-fill {
    background: linear-gradient(90deg, #ffb971, #ff8a5c);
  }

  /* Sanity fill matches label color */
  .sanity-fill {
    background: #ff9a42; /* same orange as text */
  }

</style>
</head>
<body>

<div class="status-bars">
  <!-- Food Bar -->
  <div class="bar-wrapper">
    <div class="bar-label">🍕 FOOD</div>
    <div class="bar-track">
      <div class="bar-fill food-fill" id="foodBar">
        <span class="bar-text">67%</span>
      </div>
    </div>
  </div>

  <!-- Sanity Bar -->
  <div class="bar-wrapper">
    <div class="bar-label">🧠 SANITY</div>
    <div class="bar-track">
      <div class="bar-fill sanity-fill" id="sanityBar">
        <span class="bar-text">41%</span>
      </div>
    </div>
  </div>
</div>

<script>
const foodBar = document.getElementById('foodBar');
const sanityBar = document.getElementById('sanityBar');

// Function to update bar dynamically
function updateBar(barElement, value) {
  barElement.style.width = value + '%';
  barElement.querySelector('.bar-text').textContent = value + '%';
}

// Set initial values
updateBar(foodBar, 67);
updateBar(sanityBar, 41);

// Example for external variables later
// updateBar(foodBar, externalFoodVariable);
// updateBar(sanityBar, externalSanityVariable);
</script>

</body>
</html>
